; Creature v06 - phase 2 bench bring-up tests.
; One part per environment. Flash and verify ONE part at a time, in order.
; The main firmware in ../esp-creature-core is not touched by this project.
;
; Usage:
;   pio device list                          # find your port
;   pio run -e i2c_scan -t upload            # build + flash one test
;   pio device monitor -b 115200             # read the result
;
; Run order: i2c_scan -> bme280 -> imu -> sk6812 -> speaker
; (mic + light are already proven in the v05 firmware, so they are not here.)
;
; env:smoke is a combined "all parts at once" bring-up. Use it for a quick
; full-node check; use the per-part envs above to isolate a single failure.
;   pio run -e smoke -t upload && pio device monitor -b 115200

[env]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Uncomment and set to match your board (see: pio device list).
; The v06 board uses the COM/UART USB-C port, not the OTG port.
; upload_port = /dev/cu.usbserial-110
; monitor_port = /dev/cu.usbserial-110

[env:i2c_scan]
build_src_filter = -<*> +<i2c_scan.cpp>

[env:bme280]
build_src_filter = -<*> +<bme280_test.cpp>
lib_deps = adafruit/Adafruit BME280 Library

[env:imu]
build_src_filter = -<*> +<icm20689_test.cpp>

[env:sk6812]
build_src_filter = -<*> +<sk6812_test.cpp>
lib_deps = adafruit/Adafruit NeoPixel

[env:speaker]
build_src_filter = -<*> +<max98357a_test.cpp>

[env:fuelgauge]
build_src_filter = -<*> +<max17048_test.cpp>
lib_deps = adafruit/Adafruit MAX1704X

[env:smoke]
build_src_filter = -<*> +<smoke_test.cpp>
lib_deps =
    adafruit/Adafruit NeoPixel
    claws/BH1750@^1.3.0
    adafruit/Adafruit BME280 Library
