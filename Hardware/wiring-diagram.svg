<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <rect width="720" height="440" fill="#0e1116"/>
  <text x="24" y="34" fill="#d6dde6" font-size="18" font-weight="600">Creature — Photoresistor Wiring (ESP32-S3)</text>
  <text x="24" y="56" fill="#7d8794" font-size="13">Voltage divider into GPIO 4. Onboard RGB LED (GPIO 38) needs no external wiring.</text>

  <!-- ESP board -->
  <rect x="60" y="110" width="150" height="250" rx="10" fill="#161b22" stroke="#2f3742" stroke-width="2"/>
  <text x="135" y="100" fill="#d6dde6" font-size="13" text-anchor="middle" font-weight="600">ESP32-S3</text>
  <text x="135" y="345" fill="#7d8794" font-size="11" text-anchor="middle">DevKitC-1</text>

  <!-- onboard LED on the board -->
  <circle cx="135" cy="300" r="12" fill="#5ec8f8" stroke="#2f3742"/>
  <text x="135" y="304" fill="#0e1116" font-size="9" text-anchor="middle" font-weight="700">LED</text>
  <text x="135" y="328" fill="#7d8794" font-size="10" text-anchor="middle">RGB @ IO38</text>

  <!-- pins -->
  <!-- 3V3 -->
  <rect x="200" y="140" width="20" height="14" fill="#f0625e"/>
  <text x="186" y="151" fill="#f0625e" font-size="12" text-anchor="end">3V3</text>
  <!-- GPIO4 -->
  <rect x="200" y="220" width="20" height="14" fill="#5ee08a"/>
  <text x="186" y="231" fill="#5ee08a" font-size="12" text-anchor="end">GPIO 4</text>
  <!-- GND -->
  <rect x="200" y="300" width="20" height="14" fill="#7d8794"/>
  <text x="186" y="311" fill="#7d8794" font-size="12" text-anchor="end">GND</text>

  <!-- wires -->
  <!-- 3V3 to photoresistor top -->
  <path d="M220 147 H360" stroke="#f0625e" stroke-width="2.5" fill="none"/>
  <!-- photoresistor (top) -->
  <rect x="335" y="155" width="50" height="60" rx="6" fill="#1d2630" stroke="#c9a227" stroke-width="2"/>
  <text x="360" y="190" fill="#c9a227" font-size="11" text-anchor="middle">LDR</text>
  <text x="430" y="150" fill="#7d8794" font-size="11">Photoresistor</text>

  <!-- node line -->
  <path d="M360 215 V250" stroke="#5ee08a" stroke-width="2.5" fill="none"/>
  <circle cx="360" cy="250" r="4" fill="#5ee08a"/>
  <text x="372" y="246" fill="#5ee08a" font-size="11">sensing node</text>

  <!-- node to GPIO4 -->
  <path d="M360 250 H300 V227 H220" stroke="#5ee08a" stroke-width="2.5" fill="none"/>

  <!-- node to resistor (bottom) -->
  <rect x="335" y="250" width="50" height="60" rx="6" fill="#1d2630" stroke="#5ec8f8" stroke-width="2"/>
  <text x="360" y="285" fill="#5ec8f8" font-size="11" text-anchor="middle">10k</text>
  <text x="430" y="285" fill="#7d8794" font-size="11">10k resistor</text>

  <!-- resistor bottom to GND -->
  <path d="M360 310 V340 H300 V307 H220" stroke="#7d8794" stroke-width="2.5" fill="none"/>

  <!-- flow caption -->
  <text x="24" y="410" fill="#7d8794" font-size="12">3V3 → photoresistor → (sensing node → GPIO 4) → 10k resistor → GND</text>
  <text x="24" y="430" fill="#7d8794" font-size="12">As light rises, the analog value on GPIO 4 changes. ADC range 0–4095.</text>
</svg>
